# Active Learning Configuration - Uncertainty Sampling

model:
  name: "resnet18"
  pretrained: true
  num_classes: 4

training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0001
  early_stopping_patience: 5
  seed: 42

data:
  data_dir: "./data/raw/kaggle-vehicle/"
  val_split: 0.15
  test_split: 0.15
  augmentation: true
  num_workers: 4

active_learning:
  enabled: true
  num_cycles: 5
  sampling_strategy: "uncertainty"
  initial_pool_size: 50
  batch_size_al: 30
  uncertainty_method: "least_confidence"
  reset_weights_each_cycle: true

checkpoint:
  save_every_n_epochs: 10
  save_best_model: true
  save_best_per_cycle: true
  log_every_n_batches: 50