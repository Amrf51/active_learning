# Standard Training Baseline Template
# No active learning - for comparison experiments

model:
  name: "resnet18"
  pretrained: true
  num_classes: 4

training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0001
  early_stopping_patience: 10
  seed: 42

data:
  data_dir: "./data/raw/kaggle-vehicle/"
  val_split: 0.15
  test_split: 0.15
  augmentation: true
  num_workers: 4

active_learning:
  enabled: false
  num_cycles: 1
  sampling_strategy: "random"
  initial_pool_size: 0
  batch_size_al: 0
  uncertainty_method: "least_confidence"
  reset_mode: "none"

checkpoint:
  save_every_n_epochs: 10
  save_best_model: true
  save_best_per_cycle: false
  log_every_n_batches: 50

dashboard:
  heartbeat_interval: 5
  heartbeat_timeout: 30
  auto_refresh_interval: 3000
  num_probe_images_per_class: 2
  experiments_base_dir: "./experiments"

_template_info:
  name: "baseline_standard"
  description: "Standard training without active learning - baseline for comparisons"
  created_at: "2024-12-16T19:34:00"
  tags: ["baseline", "standard", "no_active_learning", "comparison"]